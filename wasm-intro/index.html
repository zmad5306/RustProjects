<!doctype html>
<html>
  <body>
    <h1>Rust WASM Intro</h1>

    <button id="add">Add 2 + 3</button>
    <button id="greet">Greet</button>
    <button id="benchmark">Benchmark JS vs Rust/WASM</button>

    <pre id="output"></pre>

    <script type="module">
      import init, { add, crunch_numbers, greet } from "./pkg/wasm_intro.js";

      await init();

      const output = document.getElementById("output");
      const iterations = 10_000_000;
      const mask64 = (1n << 64n) - 1n;

      function crunchNumbersJs(iterations) {
        let state = 0x123456789abcdef0n;

        for (let i = 0; i < iterations; i++) {
          const step = (BigInt(i) * 0x9e3779b97f4a7c15n) & mask64;
          state = (state ^ step) & mask64;
          state = ((state << 27n) | (state >> 37n)) & mask64;
          state =
            (state * 0xbf58476d1ce4e5b9n + 0x94d049bb133111ebn) & mask64;
          state = (state ^ (state >> 31n)) & mask64;
        }

        return state.toString();
      }

      function time(label, run) {
        const startedAt = performance.now();
        const result = run();
        const elapsed = performance.now() - startedAt;

        return { label, result, elapsed };
      }

      function formatRun(run) {
        return `${run.label}: ${run.elapsed.toFixed(2)}ms, checksum ${run.result}`;
      }

      document.getElementById("add").onclick = () => {
        output.textContent = add(2, 3);
      };

      document.getElementById("greet").onclick = () => {
        output.textContent = greet("Zach");
      };

      document.getElementById("benchmark").onclick = () => {
        output.textContent = `Running ${iterations.toLocaleString()} iterations...`;

        requestAnimationFrame(() => {
          const jsRun = time("JavaScript", () => crunchNumbersJs(iterations));
          const rustRun = time("Rust/WASM", () => crunch_numbers(iterations));
          const speedup = jsRun.elapsed / rustRun.elapsed;

          output.textContent = [
            `Same work, same checksum: ${jsRun.result === rustRun.result}`,
            formatRun(jsRun),
            formatRun(rustRun),
            `Rust/WASM was ${speedup.toFixed(2)}x as fast in this run.`,
          ].join("\n");
        });
      };
    </script>
  </body>
</html>
